<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Une petite question ❤️</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        font-family:Arial,sans-serif;
    }

    .card{
        background:white;
        padding:40px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        max-width:500px;
    }

    h1{
        color:#ff4f81;
    }

    button{
        padding:12px 24px;
        margin:10px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
    }

    .yes{
        background:#4CAF50;
        color:white;
    }

    .no{
        background:#ff6b6b;
        color:white;
        position:relative;
    }

    #result{
        margin-top:20px;
        font-size:22px;
        color:#ff4f81;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="card">
    <h1>❤️ Salut mon amour ❤️</h1>
    <p>
        J'aimerais t'inviter pour une soirée spéciale.
        Accepterais-tu un rendez-vous avec moi ce samedi ?
    </p>

    <button class="yes" onclick="acceptDate()">Oui 🥰</button>
    <button class="no" id="noBtn">Non 😅</button>

    <div id="result"></div>
</div>

<script>
function acceptDate() {
    document.getElementById("result").innerHTML =
        "🎉 Génial ! J'ai hâte de passer ce moment avec toi ❤️";
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * 300 - 150;
    const y = Math.random() * 200 - 100;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
