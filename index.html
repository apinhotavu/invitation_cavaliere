<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation ❤️</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        font-family:Arial, sans-serif;
    }

    .card{
        background:white;
        padding:40px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        max-width:520px;
    }

    h1{
        color:#ff4f81;
        margin-bottom:10px;
    }

    p{
        color:#444;
        font-size:16px;
        line-height:1.5;
    }

    button{
        padding:12px 24px;
        margin:10px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
        transition:0.2s;
    }

    .yes{
        background:#4CAF50;
        color:white;
    }

    .no{
        background:#ff6b6b;
        color:white;
        position:relative;
    }

    #result{
        margin-top:20px;
        font-size:22px;
        color:#ff4f81;
        font-weight:bold;
    }
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Veux-tu être ma cavalière pour la soirée Asobo d'été ? ❤️</h1>

    <p>
        Chaque soirée devient plus belle quand elle est partagée avec la bonne personne.  
        J'aimerais beaucoup vivre celle-ci avec toi et créer ensemble de nouveaux souvenirs.
    </p>

    <button class="yes" onclick="acceptDate()">Oui 🥰</button>
    <button class="no" id="noBtn">Non 😅</button>

    <div id="result"></div>
</div>

<script>
function acceptDate() {
    document.getElementById("result").innerHTML =
        "🎉 Génial ! J'ai hâte de passer ce moment avec toi ! ❤️";
}

// bouton "Non" qui fuit légèrement (classique de la démocratie romantique)
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * 300 - 150;
    const y = Math.random() * 200 - 100;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
