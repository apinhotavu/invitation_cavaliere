<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation ❤️</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        font-family:Arial, sans-serif;
        overflow:hidden;
    }

    .card{
        background:white;
        padding:40px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        max-width:520px;
        position:relative;
        z-index:10;
    }

    h1{ color:#ff4f81; }

    p{ color:#444; line-height:1.5; }

    button{
        padding:12px 24px;
        margin:10px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
    }

    .yes{ background:#4CAF50; color:white; }
    .no{ background:#ff6b6b; color:white; position:relative; }

    #result{
        margin-top:20px;
        font-size:22px;
        color:#ff4f81;
        font-weight:bold;
    }

    .heart{
        position:absolute;
        color:rgba(255,255,255,0.7);
        font-size:20px;
        animation:floatUp 6s linear infinite;
    }

    @keyframes floatUp{
        0%{ transform:translateY(100vh); opacity:0; }
        50%{ opacity:1; }
        100%{ transform:translateY(-10vh); opacity:0; }
    }

    /* bouton son discret */
    #soundHint{
        position:fixed;
        bottom:10px;
        right:10px;
        background:rgba(255,255,255,0.7);
        padding:8px 12px;
        border-radius:10px;
        font-size:12px;
        cursor:pointer;
        z-index:20;
    }
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Veux-tu être ma cavalière pour la soirée Asobo d'été ? ❤️</h1>

    <p>
        Chaque soirée devient plus belle quand elle est partagée avec la bonne personne.
        J’aimerais beaucoup vivre celle-ci avec toi et créer ensemble de nouveaux souvenirs.
    </p>

    <button class="yes" onclick="acceptDate()">Oui 🥰</button>
    <button class="no" id="noBtn">Non 😅</button>

    <div id="result"></div>
</div>

<div id="soundHint" onclick="enableSound()">🔊 Activer la musique</div>

<audio id="music" loop preload="auto">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1b1c6d2.mp3?filename=romantic-love-piano-ambient-110397.mp3" type="audio/mp3">
</audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

let soundEnabled = false;

function enableSound(){
    const music = document.getElementById("music");
    music.volume = 0.5;
    music.play().then(() => {
        soundEnabled = true;
        document.getElementById("soundHint").innerText = "🔊 Musique activée ❤️";
    }).catch(() => {
        alert("Ton navigateur bloque encore la musique 😅");
    });
}

function acceptDate(){

    document.getElementById("result").innerHTML =
        "🎉 Génial ! J’ai hâte de passer ce moment avec toi ! ❤️";

    // musique (fiable maintenant)
    const music = document.getElementById("music");
    music.volume = 0.5;
    music.play().catch(()=>{});

    // confettis
    confetti({ particleCount: 200, spread: 120, origin: { y: 0.6 } });

    // cœurs
    for(let i=0;i<25;i++) createHeart();

    // calendrier Apple (.ics)
    downloadCalendarEvent();
}

// bouton "non" qui fuit
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
    const x = Math.random()*300 - 150;
    const y = Math.random()*200 - 100;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

// cœurs flottants
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*window.innerWidth + "px";
    heart.style.fontSize = (10 + Math.random()*20) + "px";
    heart.style.animationDuration = (3 + Math.random()*5) + "s";

    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),7000);
}

setInterval(createHeart, 500);

// 📅 calendrier Apple / iPhone / Google compatible
function downloadCalendarEvent(){

    const event =
`BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
DTSTART:20260625T183000
DTEND:20260625T213000
SUMMARY:Soirée Asobo
DESCRIPTION:Une soirée spéciale 💕
END:VEVENT
END:VCALENDAR`;

    const blob = new Blob([event], { type:"text/calendar" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "Soiree_Asobo.ics";
    document.body.appendChild(a);
    a.click();

    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
