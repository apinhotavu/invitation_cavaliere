<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitation ❤️</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#ff9a9e,#fad0c4);
        font-family:Arial, sans-serif;
        overflow:hidden;
    }

    .card{
        background:white;
        padding:40px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
        max-width:520px;
        position:relative;
        z-index:10;
    }

    h1{
        color:#ff4f81;
    }

    p{
        color:#444;
        line-height:1.5;
    }

    button{
        padding:12px 24px;
        margin:10px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
    }

    .yes{
        background:#4CAF50;
        color:white;
    }

    .no{
        background:#ff6b6b;
        color:white;
        position:relative;
    }

    #result{
        margin-top:20px;
        font-size:22px;
        color:#ff4f81;
        font-weight:bold;
    }

    /* ❤️ cœurs flottants */
    .heart{
        position:absolute;
        color:rgba(255,255,255,0.7);
        font-size:20px;
        animation:floatUp 6s linear infinite;
    }

    @keyframes floatUp{
        0%{
            transform:translateY(100vh) scale(0.5);
            opacity:0;
        }
        50%{
            opacity:1;
        }
        100%{
            transform:translateY(-10vh) scale(1.2);
            opacity:0;
        }
    }
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Veux-tu être ma cavalière ? ❤️</h1>

    <p>
        Chaque soirée devient plus belle quand elle est partagée avec la bonne personne.  
        J’aimerais vivre celle-ci avec toi et créer de nouveaux souvenirs. 
        Je te donne rendez vous le Jeudi 25 Juin 2026 à partir de 18h30 ! 
    </p>

    <button class="yes" onclick="acceptDate()">Oui 🥰</button>
    <button class="no" id="noBtn">Non 😅</button>

    <div id="result"></div>
</div>

<!-- musique -->
<audio id="music" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1b1c6d2.mp3?filename=romantic-love-piano-ambient-110397.mp3" loop></audio>

<!-- confettis -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
function acceptDate() {

    // message
    document.getElementById("result").innerHTML =
        "🎉 Génial ! J’ai hâte de passer ce moment avec toi ! ❤️";

    // musique
    const music = document.getElementById("music");
    music.volume = 0.5;
    music.play();

    // confettis (oui, ça explose littéralement)
    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    // pluie de confettis bonus
    let interval = setInterval(() => {
        confetti({
            particleCount: 80,
            spread: 100,
            origin: { x: Math.random(), y: Math.random() * 0.5 }
        });
    }, 400);

    setTimeout(() => clearInterval(interval), 4000);

    // cœurs supplémentaires
    for(let i=0;i<20;i++){
        createHeart();
    }
}

// bouton "Non" qui fuit (toujours aussi immature)
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * 300 - 150;
    const y = Math.random() * 200 - 100;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

// cœurs flottants permanents
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (10 + Math.random() * 20) + "px";
    heart.style.animationDuration = (3 + Math.random() * 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 7000);
}

// génération continue de cœurs
setInterval(createHeart, 500);
</script>

</body>
</html>
